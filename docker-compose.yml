services:
  ida-untis-mcp:
    image: ghcr.io/${GITHUB_OWNER:-l8tenever}/ida-untis:${IMAGE_TAG:-latest}
    container_name: ida-untis-mcp
    restart: unless-stopped

    # Nur auf localhost binden: von aussen ist der Port NICHT erreichbar,
    # nur der auf demselben Server laufende cloudflared-Tunnel kann ihn
    # ansprechen. Absicherung nach aussen passiert zusaetzlich per Token
    # (siehe MCP_AUTH_TOKEN) direkt in der Anwendung.
    ports:
      - "127.0.0.1:${MCP_PORT:-8000}:8000"

    environment:
      UNTIS_SCHOOL: ${UNTIS_SCHOOL:?Bitte UNTIS_SCHOOL in .env setzen}
      UNTIS_USERNAME: ${UNTIS_USERNAME:?Bitte UNTIS_USERNAME in .env setzen}
      UNTIS_PASSWORD: ${UNTIS_PASSWORD:?Bitte UNTIS_PASSWORD in .env setzen}
      UNTIS_SERVER: ${UNTIS_SERVER:?Bitte UNTIS_SERVER in .env setzen}
      UNTIS_USERAGENT: ${UNTIS_USERAGENT:-Ida-Untis-MCP}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:?Bitte MCP_AUTH_TOKEN in .env setzen}
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # Sicherheits-Haertung: kein root im Container (siehe Dockerfile),
    # keine neuen Privilegien, alle Linux-Capabilities entfernt, Dateisystem
    # read-only (nur /tmp beschreibbar fuer temporaere Dateien).
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
